name: fabric-1.20.4-server

on:
  workflow_dispatch:

# إضافة صلاحيات الكتابة
permissions:
  contents: write

jobs:
  minecraft:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Playit Tunnel (Docker)
        run: |
          echo "=== Starting Playit via Docker ==="
          
          # Use hardcoded secret key
          SECRET_KEY="2920331c04e20c8bbc86def3c3deaaf18a643b3dfc64ba45920519b4d7ac212b"
          echo "✔ Using hardcoded secret_key"
          
          # Run playit in Docker with host network
          echo "🚀 Starting playit Docker container..."
          docker run -d \
            --name playit-agent \
            --network host \
            --restart unless-stopped \
            -e SECRET_KEY="$SECRET_KEY" \
            ghcr.io/playit-cloud/playit-agent:latest
          
          echo "⏳ Waiting for tunnel (20 seconds)..."
          sleep 20
          
          # Check container status
          echo "=== Container Status ==="
          docker ps -a | grep playit-agent || echo "Container not found"
          
          # Show logs
          echo "=== Playit Logs ==="
          docker logs playit-agent 2>&1 | tail -30
          echo "==================="
          
          # Verify container is running
          if docker ps | grep -q playit-agent; then
            echo "✔ Playit tunnel is ACTIVE via Docker!"
          else
            echo "⚠️ Playit container failed, check logs above"
            docker logs playit-agent
            echo "⚠️ Continuing anyway..."
          fi
      
      - name: Download or Check Server
        run: |
          if [ ! -f "server.jar" ]; then
            echo "⬇️ Downloading Fabric 1.20.4..."
            wget -O fabric-installer.jar https://maven.fabricmc.net/net/fabricmc/fabric-installer/1.0.1/fabric-installer-1.0.1.jar
            java -jar fabric-installer.jar server -mcversion 1.20.4 -downloadMinecraft
            
            # Rename the generated jar to server.jar
            mv fabric-server-*.jar server.jar 2>/dev/null || echo "Using existing server.jar"
          fi
          
          echo "✔ Server ready"
      
      - name: Run Fabric Server
        run: |
          echo "=== Starting Fabric 1.20.4 Server ==="
          
          # التحقق من وجود server.jar
          if [ ! -f "server.jar" ]; then
            echo "❌ server.jar not found!"
            echo "Please upload your Fabric server.jar to the repository"
            exit 1
          fi
          
          java -Xmx18G -Xms14G \
            -XX:+UseG1GC \
            -XX:+ParallelRefProcEnabled \
            -XX:MaxGCPauseMillis=200 \
            -XX:+UnlockExperimentalVMOptions \
            -XX:+DisableExplicitGC \
            -XX:+AlwaysPreTouch \
            -XX:G1NewSizePercent=30 \
            -XX:G1MaxNewSizePercent=40 \
            -XX:G1HeapRegionSize=16M \
            -XX:G1ReservePercent=20 \
            -XX:G1HeapWastePercent=5 \
            -XX:G1MixedGCCountTarget=4 \
            -XX:InitiatingHeapOccupancyPercent=15 \
            -XX:G1MixedGCLiveThresholdPercent=90 \
            -XX:G1RSetUpdatingPauseTimePercent=5 \
            -XX:SurvivorRatio=32 \
            -XX:+PerfDisableSharedMem \
            -XX:MaxTenuringThreshold=1 \
            -jar server.jar nogui &
          SERVER_PID=$!
          
          echo "✔ Server started (PID: $SERVER_PID)"
          echo "⏳ Waiting 1 minute..."
          sleep 60
          
          echo ""
          echo "=== Server ONLINE ==="
          echo "🎮 Fabric 1.20.4"
          echo "💾 RAM: 18GB"
          
          MAX_TIME=20700
          ELAPSED=0
          
          while [ $ELAPSED -lt $MAX_TIME ]; do
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "=== Server stopped ==="
              break
            fi
            sleep 10
            ELAPSED=$((ELAPSED + 10))
            if [ $((ELAPSED % 1800)) -eq 0 ]; then
              echo "⏰ $((ELAPSED / 60)) minutes"
            fi
          done
          
          if kill -0 $SERVER_PID 2>/dev/null; then
            kill -TERM $SERVER_PID 2>/dev/null || true
            sleep 5
            kill -9 $SERVER_PID 2>/dev/null || true
          fi
          
          # Stop and remove playit Docker container
          echo "🛑 Stopping playit..."
          docker stop playit-agent 2>/dev/null || true
          docker rm playit-agent 2>/dev/null || true
          echo "✔ Stopped"
      
      - name: Save changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          
          if ! git diff --cached --quiet 2>/dev/null; then
            git commit -m "Auto-save: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            git push
            echo "✔ Saved"
          fi
      
      - name: Auto-retrigger
        if: github.run_attempt < 3
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          runs=$(gh run list -w fabric-1.20.4-server.yml --json status -q \
               '[.[] | select(.status=="queued" or .status=="in_progress")] | length')
          
          if [ "$runs" -le 1 ]; then
            gh workflow run fabric-1.20.4-server.yml
            echo "✔ Retriggered"
          fi
